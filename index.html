<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Guru — Find Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f8fafc; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #0f172a;
    }
    h1, h2, h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; border: none; cursor: pointer; background: none; }
    input::placeholder { color: #94a3b8; }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: .5; }

    .tg-card { transition: box-shadow .18s ease, border-color .18s ease; }
    .tg-card:hover { box-shadow: 0 10px 24px rgba(15,23,42,.12) !important; }
    .tg-card.is-active { box-shadow: 0 12px 28px rgba(15,23,42,.16) !important; }

    .tg-card-feature-wrap { transition: box-shadow .18s ease, border-color .18s ease; }
    .tg-card-feature-wrap:hover { box-shadow: 0 12px 28px rgba(15,23,42,.14) !important; }

    .tg-rank {
      position: absolute; top: 10px; left: 10px; z-index: 3;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 9px 4px 7px;
      border-radius: 999px;
      font-size: 10.5px; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.18);
      font-family: 'Space Grotesk', 'Inter', sans-serif;
    }
    .tg-rank--1 { background: linear-gradient(135deg, #f59e0b, #b45309); }
    .tg-rank--2 { background: linear-gradient(135deg, #cbd5e1, #64748b); }
    .tg-rank--3 { background: linear-gradient(135deg, #fdba74, #9a3412); }
    .tg-rank .tg-rank-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 999px;
      background: rgba(255,255,255,.28);
      font-size: 10px; font-weight: 800;
    }

    @keyframes tgFadeIn  { from { opacity: 0 } to { opacity: 1 } }
    @keyframes tgFadeUp  { from { opacity: 0; transform: translate(-50%, calc(-100% - 40px)); } to { opacity: 1; transform: translate(-50%, calc(-100% - 48px)); } }
    @keyframes tgSlideIn { from { transform: translateX(100%) } to { transform: translateX(0) } }

    body::-webkit-scrollbar { width: 12px; }
    body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 3px solid #f8fafc; }
    body::-webkit-scrollbar-track { background: #f8fafc; }

    ::-webkit-scrollbar-horizontal { height: 6px; }

    .tg-pin-icon { background: transparent; border: 0; }
    .tg-pin {
      position: relative;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .tg-pin .tg-pin-dot {
      position: relative;
      width: 18px; height: 18px; border-radius: 50%;
      background: #dc2626;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(15,23,42,.32), 0 0 0 1px rgba(15,23,42,.15);
      transition: width .15s, height .15s, background .15s, border-color .15s, box-shadow .15s;
    }
    .tg-pin:hover .tg-pin-dot,
    .tg-pin--hover .tg-pin-dot {
      width: 22px; height: 22px;
      box-shadow: 0 4px 14px rgba(15,23,42,.4), 0 0 0 1px rgba(15,23,42,.2);
    }
    .tg-pin--hover::before {
      content: ""; position: absolute; left: 50%; top: 50%;
      width: 40px; height: 40px; margin: -20px 0 0 -20px;
      border-radius: 50%; background: rgba(220,38,38,.14);
    }
    .tg-pin--active::before {
      content: ""; position: absolute; left: 50%; top: 50%;
      width: 44px; height: 44px; margin: -22px 0 0 -22px;
      border-radius: 50%; background: rgba(220,38,38,.18);
      animation: tgPinPulse 1.6s ease-out infinite;
    }
    .tg-pin--active .tg-pin-dot {
      width: 24px; height: 24px;
      background: #0f172a; border-color: #fff;
      box-shadow: 0 4px 16px rgba(15,23,42,.45), 0 0 0 1px rgba(15,23,42,.25);
    }
    .tg-pin--active .tg-pin-dot::after {
      content: ""; position: absolute; left: 50%; top: 50%;
      width: 7px; height: 7px; margin: -3.5px 0 0 -3.5px;
      border-radius: 50%; background: #fff;
    }

    @keyframes tgPinPulse {
      0%   { transform: scale(0.85); opacity: .55; }
      70%  { transform: scale(1.2);  opacity: 0; }
      100% { transform: scale(1.2);  opacity: 0; }
    }

    .leaflet-control-attribution { font-size: 10px; }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 18px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">Loading Tournament Guru...</div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="card-art.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="filters.jsx"></script>
  <script type="text/babel" src="cards.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    window.addEventListener('error', (e) => {
      document.getElementById('loading').innerHTML = '<div style="color: red; padding: 20px; text-align: center;"><strong>Error:</strong><br/>' + e.message + '</div>';
    });
  </script>
</body>
</html>
