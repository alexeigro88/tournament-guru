<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event · Tournament Guru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f8fafc; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: #0f172a;
  }
  h1, h2, h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; margin: 0; }
  a { color: inherit; }
  button { font-family: inherit; }

  body::-webkit-scrollbar { width: 12px; }
  body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 3px solid #f8fafc; }

  .ev-btn-primary {
    background: #0f172a; color: #fff; border: 0;
    padding: 12px 18px; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .15s;
  }
  .ev-btn-primary:hover { background: #1e293b; }

  .ev-btn-ghost {
    background: #fff; color: #0f172a; border: 1px solid #e2e8f0;
    padding: 11px 16px; border-radius: 12px;
    font-size: 13.5px; font-weight: 600; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .ev-btn-ghost:hover { border-color: #94a3b8; background: #f8fafc; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="card-art.jsx"></script>
  <script type="text/babel" src="event.jsx"></script>
</body>
</html>
